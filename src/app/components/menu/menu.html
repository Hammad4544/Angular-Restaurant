<section class="py-5 bg-dark min-vh-100">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-5 border-bottom border-warning pb-3">
            <h2 class="fw-bold text-white">Our <span class="text-warning">Delicious Menu</span></h2>
            <button class="btn btn-outline-warning rounded-pill px-4" routerLink="/home">
                <i class="bi bi-arrow-left"></i> Back to Branches
            </button>
        </div>

        <div class="d-flex justify-content-center flex-wrap gap-2 mb-5">
            <button (click)="filterByCategory(0)" 
                    [class.btn-warning]="activeCatId === 0"
                    [class.btn-outline-warning]="activeCatId !== 0"
                    class="btn rounded-pill px-4 fw-bold shadow-sm transition-all">
                All Items
            </button>

            @for (cat of categories; track cat.id) {
            <button (click)="filterByCategory(cat.id)" 
                    [class.btn-warning]="activeCatId === cat.id"
                    [class.btn-outline-warning]="activeCatId !== cat.id"
                    class="btn rounded-pill px-4 fw-bold shadow-sm text-capitalize transition-all">
                {{ cat.name }}
            </button>
            }
        </div>

        <div class="row g-4">
            @for (item of filteredItems; track item.id) {
            <div class="col-lg-3 col-md-6">
                <div class="card h-100 border-0 shadow-lg menu-card bg-secondary text-white overflow-hidden rounded-4">
                    <div class="position-relative">
                        <img [src]="item.images && item.images.length > 0 
                            ? 'http://localhost:5161' + item.images[0] 
                            : 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=500'" 
                            class="card-img-top"
                            [alt]="item.name" style="height: 200px; object-fit: cover;">
                        
                        <span class="badge bg-warning text-dark position-absolute bottom-0 end-0 m-3 fw-bold shadow-lg py-2 px-3 rounded-pill">
                            {{ item.price }} EGP
                        </span>
                    </div>

                    <div class="card-body d-flex flex-column p-4">
                        <h5 class="card-title fw-bold text-warning mb-2">{{ item.name }}</h5>
                        <p class="card-text text-light opacity-75 small mb-4 flex-grow-1">
                            {{ item.description }}
                        </p>

                        <button (click)="addCartItem(item)" class="btn btn-warning w-100 fw-bold py-2 rounded-pill shadow-sm mt-auto">
                            <i class="bi bi-cart-plus-fill me-2"></i> Add to Cart
                        </button>
                    </div>
                </div>
            </div>
            } @empty {
            <div class="col-12 text-center text-white py-5">
                <i class="bi bi-search display-1 text-warning mb-3 opacity-50"></i>
                <h3 class="fw-bold">No items found</h3>
                <p class="text-muted">Try selecting another category!</p>
            </div>
            }
        </div>
    </div>
</section>
